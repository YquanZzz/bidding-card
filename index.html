<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8bac0f" />
  <title>竞价卡牌 - 先到30分</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0" aria-hidden="true">
    <defs>
      <filter id="avatarGreenFilter" color-interpolation-filters="sRGB">
        <feColorMatrix type="matrix" in="SourceGraphic" values="
          0.117 0.393 0.04  0 0.06
          0.11  0.37  0.037 0 0.22
          0     0     0     0 0.06
          0     0     0     1 0
        "/>
      </filter>
    </defs>
  </svg>
  <style>
    /* 本地游戏字体：请将字体文件放在 fonts/game-font.ttf */
    @font-face {
      font-family: "GameFont";
      src: url("fonts/game-font.ttf") format("truetype");
      font-display: swap;
    }
    /* GB 初代宝可梦截图配色：四阶绿 */
    :root {
      --gb-darkest: #0f380f;
      --gb-shadow: rgba(15, 56, 15, 0.22);
      --gb-dark: #306230;
      --gb-light: #8bac0f;
      --gb-lightest: #9bbc0f;
      --gb-bg: #5a7c4a;
      --gb-bg-alt: #4a6b3d;
      --gb-text: #0f380f;
      /* 开始页 logo 块与底部的距离：数值越大 logo 越靠上，越小越靠下 */
      --start-logo-from-bottom: 140px;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; image-rendering: pixelated; image-rendering: crisp-edges; }
    body {
      margin: 0;
      min-height: 100dvh;
      min-width: 100vw;
      background: var(--gb-bg);
      color: var(--gb-text);
      font-family: "GameFont", "Press Start 2P", monospace;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      overflow: auto;
      position: relative;
    }
    /* 背景：纯色底 + 极淡波点 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--gb-bg);
      background-image: radial-gradient(circle, var(--gb-bg-alt) 1px, transparent 1px);
      background-size: 20px 20px;
      z-index: -2;
    }
    /* CRT 扫描线：慢慢下移 + 呼吸 + 偶尔上下扰动 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 5px,
        rgba(15,56,15,0.1) 5px,
        rgba(15,56,15,0.1) 6px
      );
      background-size: 100% 6px;
      animation: scanline-scroll 2.6s linear infinite, scanline-breathe 5s ease-in-out infinite;
      pointer-events: none;
      z-index: 9999;
    }
    @keyframes scanline-scroll {
      0% { background-position: 0 0; }
      35% { background-position: 0 2.2px; }
      36% { background-position: 0 2.8px; }
      37% { background-position: 0 2px; }
      38% { background-position: 0 2.2px; }
      70% { background-position: 0 4.2px; }
      72% { background-position: 0 4.8px; }
      74% { background-position: 0 3.8px; }
      76% { background-position: 0 4.2px; }
      100% { background-position: 0 6px; }
    }
    @keyframes scanline-breathe {
      0%, 100% { opacity: 0.95; }
      50% { opacity: 1; }
    }
    /* 统一竖屏布局：设最小宽高避免缩小后四角玩家与桌子重叠，视口更小时可滚动 */
    .game-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      min-width: 360px;
      height: 100dvh;
      min-height: 520px;
      flex-shrink: 0;
    }
    /* 中央牌桌 - 网格弱化，仅作轻微纹理 */
    .felt {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 54vmin;
      height: 54vmin;
      min-width: 180px;
      min-height: 180px;
      max-width: 90%;
      aspect-ratio: 1;
      transform-origin: 50% 50%;
      background: var(--gb-dark);
      background-image:
        linear-gradient(rgba(15,56,15,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15,56,15,0.12) 1px, transparent 1px);
      background-size: 14px 14px;
      border: 4px solid var(--gb-darkest);
      border-radius: 0;
      box-shadow: inset 0 0 0 4px var(--gb-light), 0 6px 0 var(--gb-darkest);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes feltShake {
      0%, 100% { transform: translate(-50%, -50%); }
      10% { transform: translate(-50%, -50%) translate(-2px, -1px); }
      20% { transform: translate(-50%, -50%) translate(2px, 1px); }
      30% { transform: translate(-50%, -50%) translate(-1px, 2px); }
      40% { transform: translate(-50%, -50%) translate(1px, -2px); }
      50% { transform: translate(-50%, -50%) translate(-2px, 0); }
      60% { transform: translate(-50%, -50%) translate(2px, 0); }
      70% { transform: translate(-50%, -50%) translate(0, -1px); }
      80% { transform: translate(-50%, -50%) translate(0, 1px); }
      90% { transform: translate(-50%, -50%) translate(-1px, 0); }
    }
    @keyframes feltShakeHeavy {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      8% { transform: translate(-50%, -50%) translate(-4px, -2px) scale(0.985); }
      16% { transform: translate(-50%, -50%) translate(4px, 2px) scale(1.005); }
      24% { transform: translate(-50%, -50%) translate(-3px, 3px) scale(0.99); }
      32% { transform: translate(-50%, -50%) translate(3px, -2px) scale(1.008); }
      40% { transform: translate(-50%, -50%) translate(-4px, 0) scale(0.992); }
      50% { transform: translate(-50%, -50%) translate(4px, 0) scale(1.006); }
      60% { transform: translate(-50%, -50%) translate(-2px, -3px); }
      70% { transform: translate(-50%, -50%) translate(2px, 2px); }
      80% { transform: translate(-50%, -50%) translate(-3px, 0); }
      90% { transform: translate(-50%, -50%) translate(2px, -1px); }
    }
    @keyframes feltShakeLight {
      0%, 100% { transform: translate(-50%, -50%); }
      25% { transform: translate(-50%, -50%) translate(-1px, 0); }
      50% { transform: translate(-50%, -50%) translate(1px, 0); }
      75% { transform: translate(-50%, -50%) translate(0, -1px); }
    }
    .felt.felt-shake {
      animation: feltShake 0.4s ease-in-out;
    }
    .felt.felt-shake-heavy {
      animation: feltShakeHeavy 0.55s ease-out;
    }
    .felt.felt-shake-light {
      animation: feltShakeLight 0.22s ease-out;
    }
    @keyframes feltShakeRap {
      0%, 100% { transform: translate(-50%, -50%); }
      25% { transform: translate(-50%, -50%) translate(-1px, 0); }
      50% { transform: translate(-50%, -50%) translate(1px, 1px); }
      75% { transform: translate(-50%, -50%) translate(0, -1px); }
    }
    .felt.felt-shake-rap {
      animation: feltShakeRap 0.4s ease-in-out infinite;
    }
    .deck-and-card {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .deck-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .deck, .current-card {
      width: 44px;
      height: 60px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .deck {
      background: var(--gb-dark);
      border: 4px solid var(--gb-darkest);
      border-radius: 5px;
      box-shadow: 0 5px 0 var(--gb-darkest);
      position: relative;
      overflow: hidden;
    }
    .deck::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 2px solid var(--gb-lightest);
      pointer-events: none;
    }
    .deck::after {
      content: '';
      position: absolute;
      inset: 8px;
      background: repeating-linear-gradient(
        45deg,
        transparent 0,
        transparent 3px,
        var(--gb-lightest) 3px,
        var(--gb-lightest) 4px
      );
      opacity: 0.45;
      pointer-events: none;
    }
    .deck-wrap {
      position: relative;
    }
    .deck-shuffle-pile {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 60px;
      pointer-events: none;
      z-index: 5;
    }
    .deck-shuffle-pile.hidden {
      display: none;
    }
    .shuffle-card {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 44px;
      height: 60px;
      margin-left: -22px;
      margin-top: -30px;
      background: var(--gb-dark);
      border: 4px solid var(--gb-darkest);
      border-radius: 5px;
      box-shadow: none;
      overflow: hidden;
    }
    .shuffle-card::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 2px solid var(--gb-lightest);
      pointer-events: none;
    }
    .shuffle-card::after {
      content: '';
      position: absolute;
      inset: 8px;
      background: repeating-linear-gradient(
        45deg,
        transparent 0,
        transparent 3px,
        var(--gb-lightest) 3px,
        var(--gb-lightest) 4px
      );
      opacity: 0.45;
      pointer-events: none;
    }
    .deck-shuffle-pile.shuffling .shuffle-card:nth-child(1) {
      animation: shuffleCard1 1.2s ease-in-out forwards;
    }
    .deck-shuffle-pile.shuffling .shuffle-card:nth-child(2) {
      animation: shuffleCard2 1.2s ease-in-out forwards;
    }
    .deck-shuffle-pile.shuffling .shuffle-card:nth-child(3) {
      animation: shuffleCard3 1.2s ease-in-out forwards;
    }
    .deck-shuffle-pile.shuffling .shuffle-card:nth-child(4) {
      animation: shuffleCard4 1.2s ease-in-out forwards;
    }
    .deck-shuffle-pile.shuffling .shuffle-card:nth-child(5) {
      animation: shuffleCard5 1.2s ease-in-out forwards;
    }
    .deck-shuffle-pile.shuffle-move-left {
      animation: shufflePileMoveLeft 0.45s ease-out forwards;
    }
    @keyframes shufflePileMoveLeft {
      0% { transform: translate(-50%, -50%); }
      100% { transform: translate(-125%, -50%); }
    }
    @keyframes shuffleCard1 {
      0%, 100% { transform: translateX(-24px) translateY(0) rotate(-8deg); z-index: 1; }
      33% { transform: translateX(8px) translateY(-6px) rotate(4deg); z-index: 3; }
      66% { transform: translateX(-8px) translateY(4px) rotate(-2deg); z-index: 2; }
    }
    @keyframes shuffleCard2 {
      0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); z-index: 2; }
      33% { transform: translateX(-20px) translateY(4px) rotate(-6deg); z-index: 1; }
      66% { transform: translateX(16px) translateY(-4px) rotate(5deg); z-index: 3; }
    }
    @keyframes shuffleCard3 {
      0%, 100% { transform: translateX(24px) translateY(0) rotate(8deg); z-index: 3; }
      33% { transform: translateX(-4px) translateY(6px) rotate(-3deg); z-index: 2; }
      66% { transform: translateX(-16px) translateY(-2px) rotate(4deg); z-index: 1; }
    }
    @keyframes shuffleCard4 {
      0%, 100% { transform: translateX(12px) translateY(0) rotate(4deg); z-index: 2; }
      33% { transform: translateX(-12px) translateY(3px) rotate(-4deg); z-index: 1; }
      66% { transform: translateX(6px) translateY(-3px) rotate(2deg); z-index: 3; }
    }
    @keyframes shuffleCard5 {
      0%, 100% { transform: translateX(32px) translateY(0) rotate(10deg); z-index: 3; }
      33% { transform: translateX(-8px) translateY(-4px) rotate(-2deg); z-index: 2; }
      66% { transform: translateX(4px) translateY(5px) rotate(6deg); z-index: 1; }
    }
    .deck.deck-hidden {
      visibility: hidden;
    }
    .current-card-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .current-card-wrap.hidden { visibility: hidden; }
    .current-card {
      background: var(--gb-lightest);
      border: 4px solid var(--gb-darkest);
      border-radius: 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 0.65rem;
      font-weight: bold;
      color: var(--gb-text);
      box-shadow: none;
      image-rendering: pixelated;
    }
    .current-card .card-value { font-size: 0.9em; line-height: 1; }
    .current-card .card-suit { font-size: 1.1em; line-height: 1; }
    .current-card.empty { background: var(--gb-dark); color: transparent; }
    .current-card.empty .card-value,
    .current-card.empty .card-suit { color: transparent; }
    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateX(-48px) scale(0.6);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }
    .current-card.card-reveal {
      animation: cardReveal 0.45s ease-out forwards;
    }
    .current-card.card-flying {
      position: fixed;
      width: 44px;
      height: 60px;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      z-index: 21;
      transition: left 0.5s ease-out, top 0.5s ease-out;
    }
    /* 桌面上筹码：放在当前叫价者一侧的桌子边缘居中，错位堆叠；z-index 保证在牌面上方 */
    .table-chips {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      overflow: visible;
      z-index: 4;
    }
    .table-chips .chip {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--gb-light);
      border: 2px solid var(--gb-darkest);
      box-shadow: inset 0 0 0 4px var(--gb-lightest), 0 2px 0 var(--gb-darkest);
    }
    .chip-burst-particle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gb-lightest);
      box-shadow: 0 0 0 1px var(--gb-lightest), 0 0 4px 1px rgba(155, 188, 15, 0.6);
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: chip-burst-out 0.4s ease-out forwards;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    @keyframes chip-burst-out {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
      100% { transform: translate(-50%, -50%) translate(var(--tx), var(--ty)) scale(0.8); opacity: 0; }
    }
    .chip-fly-layer {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
    }
    .chip-fly-layer .chip {
      position: fixed;
      width: 18px;
      height: 18px;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--gb-light);
      border: 2px solid var(--gb-darkest);
      box-shadow: inset 0 0 0 4px var(--gb-lightest), 0 2px 0 var(--gb-darkest);
      transition: left 0.35s ease-out, top 0.35s ease-out;
    }
    .xiaobai-victory-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 54vmin;
      height: 54vmin;
      min-width: 180px;
      min-height: 180px;
      max-width: 90%;
      aspect-ratio: 1;
      pointer-events: none;
      z-index: 25;
      overflow: visible;
    }
    .xiaobai-victory-wrap.xiaobai-caught-overlay {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      transform: none;
      min-width: 0;
      min-height: 0;
      max-width: none;
      aspect-ratio: auto;
    }
    .xiaobai-victory-wrap .table-bubble {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, 0);
      padding: 8px 12px;
      background: var(--gb-lightest);
      border: 3px solid var(--gb-darkest);
      border-radius: 6px;
      box-shadow: 3px 3px 0 var(--gb-shadow);
      font-size: 9px;
      font-weight: bold;
      color: var(--gb-text);
      white-space: nowrap;
      z-index: 30;
    }
    .xiaobai-victory-wrap .table-bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--gb-darkest);
    }
    .xiaobai-victory-wrap .table-bubble.bubble-shake-loop,
    .table-bubble-fixed.bubble-shake-loop {
      animation: bubbleShake 0.35s ease-in-out infinite;
    }
    @keyframes bubblePop {
      0% { transform: translate(-50%, 0) scale(0.6); opacity: 0; }
      50% { transform: translate(-50%, 0) scale(1.15); opacity: 1; }
      100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
    }
    .xiaobai-victory-wrap .table-bubble.bubble-pop {
      animation: bubblePop 0.2s ease-out forwards;
    }
    .table-bubble-fixed {
      position: fixed;
      left: 0;
      top: 0;
      transform: translate(-50%, 0);
      padding: 8px 12px;
      background: var(--gb-lightest);
      border: 3px solid var(--gb-darkest);
      border-radius: 6px;
      box-shadow: 3px 3px 0 var(--gb-shadow);
      font-size: 9px;
      font-weight: bold;
      color: var(--gb-text);
      white-space: nowrap;
      z-index: 99999;
      pointer-events: none;
      display: block;
      visibility: visible;
      opacity: 1;
    }
    @keyframes bubbleBounceFixed {
      0% { transform: translate(-50%, 0) scale(0); opacity: 0; }
      55% { transform: translate(-50%, 0) scale(1.15); opacity: 1; }
      75% { transform: translate(-50%, 0) scale(0.92); opacity: 1; }
      100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
    }
    .table-bubble-fixed.bubble-animate-in {
      animation: bubbleBounceFixed 0.38s ease-out forwards;
      transform-origin: bottom center;
    }
    .table-bubble-fixed::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--gb-darkest);
    }
    .xiaobai-victory-wrap .xiaobai-avatar {
      position: absolute;
      width: 36px;
      height: 36px;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      background: var(--gb-lightest);
      border: 3px solid var(--gb-darkest);
      border-radius: 5px;
      box-shadow: none;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .xiaobai-victory-wrap.xiaobai-caught-overlay .xiaobai-avatar {
      transition: transform 0.22s ease-out;
    }
    .xiaobai-victory-wrap .xiaobai-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      filter: url(#avatarGreenFilter);
    }
    .xiaobai-victory-wrap .xiaobai-ball {
      position: absolute;
      width: 22px;
      height: 22px;
      left: 0;
      top: 0;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--gb-lightest);
      border: 2px solid var(--gb-darkest);
      box-shadow: 2px 2px 0 var(--gb-shadow), inset -2px -2px 0 rgba(15,56,15,0.2);
    }
    .xiaobai-victory-wrap .xiaobai-ball.mouse {
      width: 24px;
      height: 20px;
      border-radius: 50% 50% 45% 45%;
      background: var(--gb-light);
      border: 2px solid var(--gb-darkest);
      box-shadow: 2px 2px 0 var(--gb-shadow);
    }
    .xiaobai-victory-wrap .xiaobai-ball.mouse::before,
    .xiaobai-victory-wrap .xiaobai-ball.mouse::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      top: -5px;
      border-radius: 50%;
      background: var(--gb-light);
      border: 2px solid var(--gb-darkest);
      box-shadow: 1px 1px 0 var(--gb-shadow);
    }
    .xiaobai-victory-wrap .xiaobai-ball.mouse::before {
      left: -4px;
    }
    .xiaobai-victory-wrap .xiaobai-ball.mouse::after {
      right: -4px;
      left: auto;
    }
    .xiaobai-victory-wrap .xiaobai-ball.mouse .mouse-tail {
      position: absolute;
      width: 14px;
      height: 4px;
      left: 50%;
      bottom: -2px;
      transform: translateX(-50%) rotate(15deg);
      border-radius: 2px;
      background: var(--gb-darkest);
      box-shadow: 1px 0 0 var(--gb-shadow);
    }
    /* 被抓目标：自定义头像，无边框，透明底 */
    .xiaobai-victory-wrap .xiaobai-ball.caught-avatar {
      width: 24px;
      height: 24px;
      border-radius: 0;
      background: transparent;
      border: none;
      box-shadow: none;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .xiaobai-victory-wrap .xiaobai-ball.caught-avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: url(#avatarGreenFilter);
    }
    @keyframes caughtShake {
      0%, 100% { transform: translate(-50%, -50%) translate(0, 0); }
      25% { transform: translate(-50%, -50%) translate(-2px, -1px); }
      50% { transform: translate(-50%, -50%) translate(2px, 1px); }
      75% { transform: translate(-50%, -50%) translate(-1px, 2px); }
    }

    .rules-overlay::before {

    .chip-fly-clone {

    @keyframes bubbleBounce {
      0% { transform: translateX(-50%) scale(0); opacity: 0; }
      55% { transform: translateX(-50%) scale(1.15); opacity: 1; }

    .player-bubble.bubble-shake-loop {

    @keyframes bubbleCharShake {
      0%, 100% { transform: translate(0, 0); }

      75% { transform: translate(-1px, -1px); }

    @keyframes sweatShake {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-2px, -1px); }
      20% { transform: translate(2px, 1px); }
      30% { transform: translate(-1px, 2px); }
      40% { transform: translate(1px, -2px); }
      50% { transform: translate(-2px, 1px); }
      60% { transform: translate(2px, -1px); }
      70% { transform: translate(-1px, -1px); }
      80% { transform: translate(1px, 2px); }

    .game-over-panel {

    }

    .game-over-panel .score-line { font-size: 7px; }
    .game-over-panel .btn-again { padding: 10px 14px; font-size: 7px; }

<body>
  <!-- 开始界面：无教程窗口，底部长条 + 设置/制作组/退出 -->
  <div class="rules-overlay" id="rulesOverlay">
    <div class="rules-bg-cards" id="rulesBgCards"></div>
    <div class="start-center">
      <div class="chip start-chip-source" id="startChipSource" aria-hidden="true"></div>
      <img class="game-logo" id="gameLogo" src="logo.png" alt="竞价卡牌" onerror="this.style.display='none'" />
      <button class="btn-start" id="btnStartGame"><span class="btn-start-char" style="animation-delay: 0s">开</span><span class="btn-start-char" style="animation-delay: 0.12s">始</span><span class="btn-start-char" style="animation-delay: 0.24s">游</span><span class="btn-start-char" style="animation-delay: 0.36s">戏</span><span class="btn-start-char" style="animation-delay: 0.48s">!</span></button>
    </div>
    <div class="start-bottom-bar">
      <button type="button" class="btn-start-menu" id="btnSettings">设置</button>
      <button type="button" class="btn-start-menu" id="btnTutorial">教程</button>
      <button type="button" class="btn-start-menu" id="btnCredits">制作组</button>
      <button type="button" class="btn-start-menu" id="btnExit">退出</button>
    </div>
  </div>

  <!-- 教程说明弹窗 -->
  <div class="tutorial-overlay hidden" id="tutorialOverlay">
    <div class="tutorial-panel">

  <script>
    const DECK_SIZE = 36;

    function fillRulesBgCards() {
      var container = document.getElementById('rulesBgCards');

      container.innerHTML = '';
      var count = 20;
      var panelLeftMin = 35, panelLeftMax = 65, panelTopMin = 25, panelTopMax = 75;

        var left, top;
        switch (Math.floor(Math.random() * 4)) {
          case 0: left = 6 + Math.random() * (panelLeftMin - 6); top = 12 + Math.random() * 76; break;
          case 1: left = panelLeftMax + Math.random() * (94 - panelLeftMax); top = 12 + Math.random() * 76; break;
          case 2: left = 12 + Math.random() * 76; top = 6 + Math.random() * (panelTopMin - 6); break;
          default: left = 12 + Math.random() * 76; top = panelTopMax + Math.random() * (94 - panelTopMax); break;

        el.className = 'rules-bg-card';
        var rot = (Math.random() - 0.5) * 24;
        el.style.left = left + '%';
        el.style.top = top + '%';
        el.style.transform = 'translate(-50%,-50%) rotate(' + rot + 'deg)';

        inner.className = 'rules-bg-card-inner';
        var sideBack = document.createElement('div');

    }

    const START_CHIPS = 10;
    (function() {

    const CHIPS_PER_ROUND = 1;

    let deck = [];

    var chipSoundCtx = null;
    var TYPE_TO_KEY = { '跳过':'pass', '中标':'win', '催促':'hurry', '思考前缀':'thinkPrefix', '出价前':'beforeBid', '结束第一句':'gameOverFirst', '结束循环句':'gameOverLoop' };
    var WHO_TO_INDEX = { '吱吱':1, '杉斯':2, '小白':3, '我':0 };

    function parseCSVRow(row) {
      var parts = [];
      var inQuote = false, cur = '';
      for (var j = 0; j < row.length; j++) {
        var c = row[j];
        if (c === '"') inQuote = !inQuote;
        else if ((c === ',' && !inQuote) || (c === '\t' && !inQuote)) { parts.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      parts.push(cur.trim());
      return parts;
    }
    function loadAILinesFromCSV() {
      fetch('ai-lines.csv').then(function(r) { return r.text(); }).then(function(txt) {
        var lines = txt.trim().split(/\r?\n/);
        if (lines.length < 2) return;
        var out = {};
        for (var k in TYPE_TO_KEY) out[TYPE_TO_KEY[k]] = {};
        for (var i = 1; i < lines.length; i++) {
          var parts = parseCSVRow(lines[i]);
          if (parts.length < 2) continue;
          var typeName = (parts[0] || '').trim();
          var key = TYPE_TO_KEY[typeName];
          if (key == null) continue;
          for (var col = 1; col <= 4 && col < parts.length; col++) {
            var phraseCell = (parts[col] || '').trim();
            if (!phraseCell) continue;
            var whoIndex = col - 1;
            var phrases = phraseCell.split(/\|/).map(function(s) { return s.trim(); }).filter(Boolean);
            if (!phrases.length) continue;
            if (key === 'thinkPrefix' || key === 'gameOverFirst' || key === 'gameOverLoop') out[key][whoIndex] = phrases[0];
            else out[key][whoIndex] = phrases;
          }
        }
        window.AI_LINES = out;
      }).catch(function() {});
    }
    loadAILinesFromCSV();

    function getAILine(category, playerIndex, fallback) {
      var lines = window.AI_LINES && window.AI_LINES[category];
      if (!lines) return typeof fallback === 'string' ? fallback : (fallback && fallback[Math.floor(Math.random() * fallback.length)]);
      var arr = lines[playerIndex];
      if (arr == null) return typeof fallback === 'string' ? fallback : (fallback && fallback[Math.floor(Math.random() * fallback.length)]);
      if (typeof arr === 'string') return arr;
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function playChipSound() {
      try {
        if (!chipSoundCtx) chipSoundCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (chipSoundCtx.state === 'suspended') chipSoundCtx.resume();
        var now = chipSoundCtx.currentTime;
        var osc = chipSoundCtx.createOscillator();
        var gain = chipSoundCtx.createGain();
        osc.connect(gain);
        gain.connect(chipSoundCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1760, now);
        osc.frequency.exponentialRampToValueAtTime(1320, now + 0.04);
        gain.gain.setValueAtTime(0.88, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        osc.start(now);
        osc.stop(now + 0.06);
      } catch (e) {}
    }

    function playButtonClickSound() {
      try {
        if (!chipSoundCtx) chipSoundCtx = new (window.AudioContext || window.webkitAudioContext)();

        var osc = chipSoundCtx.createOscillator();

        gain.connect(chipSoundCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, now);
        gain.gain.setValueAtTime(0.025, now);

    function playDialogueCharSound() {
      try {

    function playDialogueHeavySound() {
      try {
        if (!chipSoundCtx) chipSoundCtx = new (window.AudioContext || window.webkitAudioContext)();

        osc.frequency.setValueAtTime(180, now);

        gain.gain.setValueAtTime(0, now);

        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

    function playSansZoomStepSound() {
      try {
        if (!chipSoundCtx) chipSoundCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (chipSoundCtx.state === 'suspended') chipSoundCtx.resume();
        var now = chipSoundCtx.currentTime;
        var osc = chipSoundCtx.createOscillator();
        var gain = chipSoundCtx.createGain();
        osc.connect(gain);
        gain.connect(chipSoundCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(65, now + 0.06);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);

    function playZhizhiNoteSound(accent) {
      try {
        if (!chipSoundCtx) chipSoundCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (chipSoundCtx.state === 'suspended') chipSoundCtx.resume();
        var ctx = chipSoundCtx;
        var now = ctx.currentTime;
        var dur = 0.14 + Math.random() * 0.05;
        var osc = ctx.createOscillator();
        var lowpass = ctx.createBiquadFilter();
        var gain = ctx.createGain();
        osc.connect(lowpass);
        lowpass.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'triangle';
        lowpass.type = 'lowpass';
        lowpass.frequency.setValueAtTime(195, now);
        var baseFreq = 72 + Math.random() * 38;
        osc.frequency.setValueAtTime(baseFreq, now);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.82, now + dur * 0.6);
        osc.frequency.setValueAtTime(baseFreq * 0.82, now + dur * 0.6);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(accent ? 0.22 : 0.15, now + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
        osc.start(now);
        osc.stop(now + dur);
      } catch (e) {}
    }

    function playPassSound() {
      try {
        if (!chipSoundCtx) chipSoundCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (chipSoundCtx.state === 'suspended') chipSoundCtx.resume();
        var now = chipSoundCtx.currentTime;
        var osc = chipSoundCtx.createOscillator();
        var gain = chipSoundCtx.createGain();
        osc.connect(gain);
        gain.connect(chipSoundCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(420, now);
        osc.frequency.exponentialRampToValueAtTime(320, now + 0.06);
        gain.gain.setValueAtTime(0.64, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
      } catch (e) {}
    }

    function playShuffleSound() {
      try {
        if (!chipSoundCtx) chipSoundCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (chipSoundCtx.state === 'suspended') chipSoundCtx.resume();
        var ctx = chipSoundCtx;
        var sr = ctx.sampleRate;
        var len = Math.floor(0.2 * sr);
        var buf = ctx.createBuffer(1, len, sr);
        var ch = buf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.2);
        var now = ctx.currentTime;
        for (var burst = 0; burst < 3; burst++) {
          var src = ctx.createBufferSource();
          src.buffer = buf;
          var filter = ctx.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.value = 900 + burst * 200;
          filter.Q.value = 0.8;
          var g = ctx.createGain();
          g.gain.setValueAtTime(0, now + burst * 0.06);
          g.gain.linearRampToValueAtTime(0.88, now + burst * 0.06 + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, now + burst * 0.06 + 0.15);
          src.connect(filter);
          filter.connect(g);
          g.connect(ctx.destination);
          src.start(now + burst * 0.06);
          src.stop(now + burst * 0.06 + 0.2);
        }
      } catch (e) {}
    }

    function playFlipSound() {
      try {
        if (!chipSoundCtx) chipSoundCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (chipSoundCtx.state === 'suspended') chipSoundCtx.resume();
        var now = chipSoundCtx.currentTime;
        var osc = chipSoundCtx.createOscillator();
        var gain = chipSoundCtx.createGain();
        osc.connect(gain);
        gain.connect(chipSoundCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(350, now);
        osc.frequency.exponentialRampToValueAtTime(620, now + 0.15);
        gain.gain.setValueAtTime(0.48, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
      } catch (e) {}
    }

    function playStartGameSound() {
      try {
        if (!chipSoundCtx) chipSoundCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (chipSoundCtx.state === 'suspended') chipSoundCtx.resume();
        var now = chipSoundCtx.currentTime;
        var osc = chipSoundCtx.createOscillator();
        var gain = chipSoundCtx.createGain();
        osc.connect(gain);
        gain.connect(chipSoundCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.08);
        osc.frequency.setValueAtTime(784, now + 0.16);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.72, now + 0.02);
        gain.gain.setValueAtTime(0.72, now + 0.16);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.36);
        osc.start(now);
        osc.stop(now + 0.36);
      } catch (e) {}
    }

    function playBidSound(amount) {
      if (!amount || amount < 1) return;
      try {
        if (!chipSoundCtx) chipSoundCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (chipSoundCtx.state === 'suspended') chipSoundCtx.resume();
        var heavy = amount >= 8;
        var ticks = heavy ? Math.min(amount, 10) : Math.min(amount, 5);
        var gap = heavy ? 0.028 : 0.038;
        var len = heavy ? 0.055 : 0.032;
        var baseFreq = heavy ? 980 : 1580;
        var freqStep = heavy ? 35 : 50;
        var gainStart = heavy ? 0.88 : 0.56;
        for (var i = 0; i < ticks; i++) {
          var t = chipSoundCtx.currentTime + i * gap;
          var osc = chipSoundCtx.createOscillator();
          var gain = chipSoundCtx.createGain();
          osc.connect(gain);
          gain.connect(chipSoundCtx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(baseFreq + i * freqStep, t);
          gain.gain.setValueAtTime(gainStart, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + len);
          osc.start(t);
          osc.stop(t + len);
        }
      } catch (e) {}
    }

    var isMusicOn = true;
    var musicCtx = null;
    var musicGain = null;
    var musicCycleTimeoutId = null;
    var currentBgmIndex = 0;
    var bgmMode = 0;
    // 舒缓 C 大调短句：C4 E4 G4 E4 / C4 G4 A4 G4（合并两层错开 1 秒的效果，整体再放慢约 1.25 倍）
    var BGM_MELODY = [262, 330, 392, 330, 262, 392, 440, 392];
    var BGM_CYCLE_MS = 6800;
    // 单周期内 (ms, 音索引)，已按时间排序，对应原来两轨错开 1 秒的合并结果
    var BGM_TIMELINE = [
      { t: 0, n: 0 }, { t: 400, n: 7 }, { t: 850, n: 1 }, { t: 1250, n: 0 }, { t: 1700, n: 2 }, { t: 2100, n: 1 },
      { t: 2550, n: 3 }, { t: 2950, n: 2 }, { t: 3400, n: 4 }, { t: 3800, n: 3 }, { t: 4250, n: 5 }, { t: 4650, n: 4 },
      { t: 5100, n: 6 }, { t: 5500, n: 5 }, { t: 5950, n: 7 }, { t: 6350, n: 6 }
    ];

    function playBgmNote(noteIndex) {
      if (bgmMode !== 0 || !isMusicOn || !musicGain || !musicCtx) return;
      try {
        if (musicCtx.state === 'suspended') musicCtx.resume();
        var now = musicCtx.currentTime;
        var osc = musicCtx.createOscillator();
        var g = musicCtx.createGain();
        osc.connect(g);
        g.connect(musicGain);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(BGM_MELODY[noteIndex], now);
        g.gain.setValueAtTime(0.4, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now);
        osc.stop(now + 0.5);
      } catch (e) {}
    }

    function scheduleBgmCycle() {
      if (!musicGain || !musicCtx) return;
      for (var i = 0; i < BGM_TIMELINE.length; i++) {
        (function(ev) {
          setTimeout(function() { playBgmNote(ev.n); }, ev.t);
        })(BGM_TIMELINE[i]);
      }
      musicCycleTimeoutId = setTimeout(scheduleBgmCycle, BGM_CYCLE_MS);
    }

    function startBgmIfNeeded() {
      if (musicCycleTimeoutId != null) return;
      try {
        musicCtx = new (window.AudioContext || window.webkitAudioContext)();
        musicGain = musicCtx.createGain();
        musicGain.connect(musicCtx.destination);
        musicGain.gain.value = isMusicOn ? 1.68 : 0;
        scheduleBgmCycle();
      } catch (e) {}
    }

    function stopNormalBgm() {
      if (musicCycleTimeoutId != null) {
        clearTimeout(musicCycleTimeoutId);
        musicCycleTimeoutId = null;
      }
    }

    /* BGM2=胜利(与游戏BGM同方式：setTimeout触发单音) | BGM3=失败 */
    var VICTORY_BGM = [
      { t: 0, f: 523 }, { t: 150, f: 659 }, { t: 300, f: 784 }, { t: 450, f: 1047 }, { t: 600, f: 784 }, { t: 750, f: 1047 }
    ];
    var FAILURE_BGM = [
      { t: 0, f: 330 }, { t: 250, f: 294 }, { t: 500, f: 262 }, { t: 750, f: 220 }
    ];

    function playVictoryNote(noteIndex) {
      if (!musicCtx || !musicGain) return;
      try {
        if (musicCtx.state === 'suspended') musicCtx.resume();
        var ev = VICTORY_BGM[noteIndex];
        var now = musicCtx.currentTime;
        var osc = musicCtx.createOscillator();
        var g = musicCtx.createGain();
        osc.connect(g);
        g.connect(musicGain);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(ev.f, now);
        g.gain.setValueAtTime(0.56, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
      } catch (e) {}
    }

    function playFailureNote(noteIndex) {
      if (!musicCtx || !musicGain) return;
      try {
        if (musicCtx.state === 'suspended') musicCtx.resume();
        var ev = FAILURE_BGM[noteIndex];
        var now = musicCtx.currentTime;
        var osc = musicCtx.createOscillator();
        var g = musicCtx.createGain();
        osc.connect(g);
        g.connect(musicGain);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(ev.f, now);
        g.gain.setValueAtTime(0.72, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now);
        osc.stop(now + 0.5);
      } catch (e) {}
    }

    function playVictoryBgm() {
      stopNormalBgm();
      bgmMode = 1;
      try {
        if (!musicCtx) musicCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!musicGain) {
          musicGain = musicCtx.createGain();
          musicGain.connect(musicCtx.destination);
        }
        musicGain.gain.value = 1.4;
        if (musicCtx.state === 'suspended') musicCtx.resume();
        for (var i = 0; i < VICTORY_BGM.length; i++) {
          (function(idx) {
            setTimeout(function() { playVictoryNote(idx); }, VICTORY_BGM[idx].t);
          })(i);
        }
        setTimeout(function() { bgmMode = 0; }, 1400);
      } catch (e) { bgmMode = 0; }
    }

    function playFailureBgm() {
      stopNormalBgm();
      bgmMode = 2;
      try {
        if (!musicCtx) musicCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!musicGain) {
          musicGain = musicCtx.createGain();
          musicGain.connect(musicCtx.destination);
        }
        musicGain.gain.value = 1.8;
        if (musicCtx.state === 'suspended') musicCtx.resume();
        for (var i = 0; i < FAILURE_BGM.length; i++) {
          (function(idx) {
            setTimeout(function() { playFailureNote(idx); }, FAILURE_BGM[idx].t);
          })(i);
        }
        setTimeout(function() { bgmMode = 0; }, 1600);
      } catch (e) { bgmMode = 0; }
    }

    function getTableChipPosition(who, pileIndex, n, chipIndex) {
      var radius = 5.5;
      var cx = 50, cy = 50;
      if (who === 0) { cx = 50; cy = 83; }
      else if (who === 1) { cx = 15; cy = 50; }
      else if (who === 2) { cx = 50; cy = 17; }
      else { cx = 85; cy = 50; }
      var offsetX = (pileIndex % 3 - 1) * 4;
      var offsetY = (pileIndex >= 2 ? 1 : -1) * 3;
      cx = cx + offsetX;
      cy = cy + offsetY;
      var ringCount = Math.min(n, 6);
      var stackCount = n - ringCount;
      var seed = who * 31 + pileIndex * 7;
      var i = chipIndex;
      var jitter = (seed + i * 7) % 5 - 2;
      var px, py;
      if (i < ringCount) {
        var angle = (i / ringCount) * 2 * Math.PI + 0.1 * i;
        px = cx + (radius + jitter * 0.3) * Math.cos(angle);
        py = cy + (radius + jitter * 0.3) * Math.sin(angle);
      } else {
        var t = (i - ringCount) / Math.max(stackCount, 1);
        px = cx + (jitter * 1.2);
        py = cy + (t * 3 - 1.5) + jitter * 0.5;
      }
      return { px: px, py: py };
    }

    function makeDeck() {
      const d = [];
      for (let v of VALUES)
        for (let s = 0; s < 4; s++) d.push({ value: v, suit: s });

        const j = Math.floor(Math.random() * (i + 1));
        [d[i], d[j]] = [d[j], d[i]];
      }
      return d;
    }

    // 任意玩家对某张牌愿意出的最高筹码（牌面值驱动 + 离30分还差多少）
    // 高牌、关键分时肯出 8～10，你出 6 时 AI 也会跟到 7
    function getMaxWillingForCard(playerIndex, cardValue) {
      var p = players[playerIndex];
      var need = TARGET_SCORE - p.score;
      if (need <= 0) return 0;
      var c = Math.max(0, p.chips);
      var v = cardValue;
      var w = 0;
      if (v >= 10) {
        w = need <= 4 ? 10 : (need <= 8 ? 8 : (need <= 12 ? 7 : 6));
      } else if (v >= 7) {
        w = need <= 5 ? 7 : (need <= 10 ? 6 : (need <= 15 ? 5 : 4));
      } else if (v >= 5) {
        w = need <= 6 ? 4 : (need <= v ? 3 : 2);
      } else {
        w = need <= v ? 2 : 1;
      }
      return Math.min(w, c, 12);
    }

    // AI 与所有人（含其他 AI、人类）平等竞争，为赢而玩；筹码多时更敢叫价
    function aiBid(aiIndex) {
      const p = players[aiIndex];
      const need = TARGET_SCORE - p.score;
      if (need <= 0) return 0;
      const value = currentCard.value;
      const chips = Math.max(0, p.chips);
      const minBid = currentBid + 1;
      if (minBid > chips) return 0;

      var myOrder = bidIndex;
      var passedCount = passedThisRound.length;
      var leaderChips = currentLeader >= 0 ? Math.max(0, players[currentLeader].chips) : 99;
      var leaderScore = currentLeader >= 0 ? players[currentLeader].score : 0;
      var leaderNeed = currentLeader >= 0 ? (TARGET_SCORE - leaderScore) : 99;

      var maxWilling = getMaxWillingForCard(aiIndex, value);

      // 筹码多时更敢叫价：筹码充足就多出 1～2，敢跟、敢抢
      if (chips >= 10) maxWilling = Math.min(chips, 12, maxWilling + 2);
      else if (chips >= 6) maxWilling = Math.min(chips, 12, maxWilling + 1);

      // 与所有人竞争：当前领先者（不论人还是 AI）接近赢或分数高时，更肯出价抢牌
      if (value >= 7 && currentLeader >= 0) {
        if (leaderScore >= 20 || leaderNeed <= 8)
          maxWilling = Math.min(chips, 12, maxWilling + 2);
      }

      if (maxWilling < minBid) return 0;

      // 下家：每人都有意愿与筹码，要压住他们才能拿牌；强对手（分数高/接近赢）多算 1
      var followers = [];
      for (var i = 1; i <= 3 - myOrder; i++) {
        var j = (firstBidder + bidIndex + i) % 4;
        followers.push(j);
      }
      var minToBeatFollowers = 0;
      for (var f = 0; f < followers.length; f++) {
        var j = followers[f];
        var theirC = Math.max(0, players[j].chips);
        var theirNeed = TARGET_SCORE - players[j].score;
        var theirCap = Math.min(theirC, getMaxWillingForCard(j, value));
        if (theirNeed <= 10 && value >= 5) theirCap = Math.min(theirC, theirCap + 1);
        if (theirCap > minToBeatFollowers) minToBeatFollowers = theirCap;
      }
      var needToBid = minToBeatFollowers;

      if (currentLeader >= 0 && leaderChips < minBid) {
        var bid = Math.min(maxWilling, Math.max(minBid, needToBid));
        return bid <= chips ? bid : 0;
      }

      if (myOrder === 3 && passedCount === 3) {
        return maxWilling >= 1 ? 1 : 0;
      }

      var targetBid = Math.max(minBid, needToBid);
      var bid = Math.min(maxWilling, targetBid, chips);
      if (bid < minBid) return 0;
      return bid;
    }

    let selectedBid = 0;

    function showBidButtons(who) {
      if (humanTurnHurryTimeoutId) {
        clearTimeout(humanTurnHurryTimeoutId);
        humanTurnHurryTimeoutId = null;
      }
      hurryAvatarIndex = -1;
      const p = players[who];
      const container = document.getElementById('bids');
      const confirmPlace = document.getElementById('bidConfirmPlace');
      const minBid = currentBid + 1;
      const maxBid = Math.max(0, p.chips);
      var canBid = maxBid >= minBid;
      selectedBid = canBid ? Math.min(minBid, maxBid) : 0;
      document.getElementById('btnPass').style.display = 'flex';
      document.getElementById('btnPass').disabled = false;
      document.getElementById('btnPass').onclick = () => doBid(who, 0);
      function scheduleHurry() {
        humanTurnHurryTimeoutId = setTimeout(function() {
          humanTurnHurryTimeoutId = null;
          if (gameOver || currentCard == null) return;
          var currentTurn = (firstBidder + bidIndex) % 4;
          if (currentTurn !== who || !players[currentTurn].isHuman) return;
          var aiIndices = [1, 2, 3];
          var randomAI = aiIndices[Math.floor(Math.random() * 3)];
          hurryAvatarIndex = randomAI;
        setPlayerBubble(randomAI, 'hurry', getAILine('hurry', randomAI, '麻溜点！'));
        render();
          setTimeout(function() {
            hurryAvatarIndex = -1;
            if (currentBubble && currentBubble.type === 'hurry') clearPlayerBubble();
            render();
            var stillHumanTurn = !gameOver && currentCard != null && (firstBidder + bidIndex) % 4 === who && players[who].isHuman;
            if (stillHumanTurn) scheduleHurry();
          }, 2000);
        }, 5000);
      }
      scheduleHurry();
      container.innerHTML = canBid ? `
        <div class="bid-picker">
          <button class="btn-arrow" type="button" id="bidDown" title="减少">−</button>
          <span class="bid-picker-value" id="bidValue">${selectedBid}</span>
          <button class="btn-arrow" type="button" id="bidUp" title="增加">+</button>
        </div>
      ` : '<span class="bid-picker-value" style="font-size:7px;color:var(--gb-text)">筹码不足，只能跳过</span>';
      confirmPlace.innerHTML = canBid ? '<button class="btn-confirm-bid" type="button" id="bidConfirm">确定</button>' : '';
      if (canBid) {
        const up = document.getElementById('bidUp');
        const down = document.getElementById('bidDown');
        const valEl = document.getElementById('bidValue');
        const confirm = document.getElementById('bidConfirm');
        function updateVal() {
          selectedBid = Math.max(minBid, Math.min(maxBid, selectedBid));
          valEl.textContent = selectedBid;
          up.disabled = selectedBid >= maxBid;
          down.disabled = selectedBid <= minBid;
        }
        up.onclick = () => { selectedBid++; updateVal(); };
        down.onclick = () => { selectedBid--; updateVal(); };
        if (confirm) confirm.onclick = () => doBid(who, selectedBid);
        updateVal();
      }
    }

    function doBid(who, amount) {
      var forcedPass = false;
      if (amount > 0) {
        var available = Math.max(0, players[who].chips);
        if (amount > available) {
          amount = 0;
          forcedPass = true;
          setMessage('筹码不足，只能跳过。');
        }
        if (amount > 0) {
          currentBid = amount;
          currentLeader = who;
          bidHistory.push({ who: who, amount: amount });
          justPlacedBid = true;
          playBidSound(amount);
          setMessage(`你出价 ${amount} 筹码。`);
        }
      }
      if (amount === 0) {
        passedThisRound.push(who);
        playPassSound();
        if (!forcedPass) setMessage('你选择跳过。');
      }
      if (humanTurnHurryTimeoutId) {
        clearTimeout(humanTurnHurryTimeoutId);
        humanTurnHurryTimeoutId = null;
      }
      hurryAvatarIndex = -1;
      document.getElementById('bids').innerHTML = '';
      document.getElementById('bidConfirmPlace').innerHTML = '';
      document.getElementById('btnPass').style.display = 'none';
      document.getElementById('btnPass').onclick = null;
      var tableChipsElForBid = document.getElementById('tableChips');
      if (tableChipsElForBid) tableChipsElForBid.removeAttribute('data-bid');
      render();
      bidIndex++;
      if (bidIndex < 4) runBidTurn(getCurrentBidder());
      else resolveBid();
    }

    function applyWinnerCard(leaderIndex, card, deduct) {
      const p = players[leaderIndex];
      p.chips = Math.max(0, p.chips - deduct);
      p.cards.push(card);
      scoreAnimatingPlayerIndex = leaderIndex;
      scoreAnimatingAdd = card.value;
      p.score += card.value;
      if (!p.isHuman) {
        var winPhrase = getAILine('win', leaderIndex, '拿来吧你！');
        setPlayerBubble(leaderIndex, 'pass', winPhrase);
      }
      currentCard = null;
      render();
      if (p.score >= TARGET_SCORE) {
        gameOver = true;
        gameOverByDeck = false;
        gameOverWinnerName = p.name;
        gameOverWinnerScore = p.score;
        gameOverIsYou = p.isHuman;
        gameOverWinnerIndex = leaderIndex;
        setTimeout(function() { showGameOverCelebration(); }, 1200);
        return;
      }
      setTimeout(function() {
        if (gameOver) return;
        if (currentLeader < 0) {
          currentCard = null;
          render();
          setTimeout(nextRound, 800);
          return;
        }
        var hasReturn = false;
        bidHistory.forEach(function(entry) {
          if (entry.who !== currentLeader && entry.amount > 0) hasReturn = true;
        });
        if (!hasReturn) {
          currentCard = null;
          render();
          setTimeout(nextRound, 800);
          return;
        }
        tableChipsClearedForCardFly = false;
        chipsReturnedByPile = [];
        for (var pi = 0; pi < bidHistory.length; pi++) chipsReturnedByPile[pi] = 0;
        chipReturnDisplay = [0, 0, 0, 0];
        bidHistory.forEach(function(entry) {
          if (entry.who !== currentLeader && entry.amount > 0)
            chipReturnDisplay[entry.who] = (chipReturnDisplay[entry.who] || 0) + entry.amount;
        });
        function doOneTick() {
          if (gameOver) {
            chipsReturnedByPile = null;
            chipReturnDisplay = null;
            currentCard = null;
            render();
            setTimeout(nextRound, 800);
            return;
          }
          var returnThisTick = [];
          var flyStarts = [];
          bidHistory.forEach(function(entry, pileIndex) {
            if (entry.who === currentLeader || entry.amount === 0) return;
            var returned = chipsReturnedByPile[pileIndex] || 0;
            if (returned >= entry.amount) return;
            var n = entry.amount - returned;
            var chipIndex = n - 1;
            var pos = getTableChipPosition(entry.who, pileIndex, n, chipIndex);
            flyStarts.push({ who: entry.who, px: pos.px, py: pos.py });
            chipsReturnedByPile[pileIndex]++;
            if (chipReturnDisplay[entry.who] > 0) chipReturnDisplay[entry.who]--;
            if (returnThisTick.indexOf(entry.who) === -1) returnThisTick.push(entry.who);
            playChipSound();
          });
          render();
          var tableChipsEl = document.getElementById('tableChips');
          var flyLayer = document.getElementById('chipFlyLayer');
          if (tableChipsEl && flyLayer) {
            var tableRect = tableChipsEl.getBoundingClientRect();
            flyStarts.forEach(function(item) {
              var chip = document.createElement('div');
              chip.className = 'chip';
              var startX = tableRect.left + tableRect.width * item.px / 100;
              var startY = tableRect.top + tableRect.height * item.py / 100;
              chip.style.left = startX + 'px';
              chip.style.top = startY + 'px';
              flyLayer.appendChild(chip);
              var targetEl = document.querySelector('#player' + item.who + ' .player-chips');
              if (targetEl) {
                var tr = targetEl.getBoundingClientRect();
                var endX = tr.left + tr.width / 2;
                var endY = tr.top + tr.height / 2;
                requestAnimationFrame(function() {
                  chip.style.left = endX + 'px';
                  chip.style.top = endY + 'px';
                });
              }
              setTimeout(function() {
                if (chip.parentNode) chip.parentNode.removeChild(chip);
              }, 380);

                function showOneBubble() {
                  if (!gameOver) return;
                  var old = document.getElementById('xiaobaiTableBubble');
                  if (old && old.parentNode) old.parentNode.removeChild(old);
                  var el = document.createElement('div');
                  el.id = 'xiaobaiTableBubble';
                  el.className = 'table-bubble-fixed bubble-animate-in';
                  el.textContent = getAILine('gameOverLoop', winIdx, 'HAHAHAHAHA');
                  el.style.left = x + 'px';
                  el.style.top = (y - 42) + 'px';
                  document.body.appendChild(el);
                  if (xiaobaiTableBubbleTimeoutId) clearTimeout(xiaobaiTableBubbleTimeoutId);
                  xiaobaiTableBubbleTimeoutId = setTimeout(function() {
                    xiaobaiTableBubbleTimeoutId = null;
                    if (!gameOver) return;
                    var o = document.getElementById('xiaobaiTableBubble');
                    if (o && o.parentNode) o.parentNode.removeChild(o);
                    if (xiaobaiTableBubbleTimeoutId) clearTimeout(xiaobaiTableBubbleTimeoutId);
                    xiaobaiTableBubbleTimeoutId = setTimeout(showOneBubble, 1000 + Math.random() * 1000);
                  }, bubbleShowDur);
                }
                showOneBubble();
              }
              /* 小白(3)只用 wrap 内的 tableBubbleEl 一个气泡，不重复创建固定气泡，避免重叠 */
            });
          }
        }, 2000);
        return;
      }
      setPlayerBubble(winnerIndex, 'pass', getAILine('gameOverFirst', winnerIndex, '在座的各位都是辣鸡~'));
      render();
      gameOverBubbleTimeoutId = setTimeout(function() {
        gameOverBubbleTimeoutId = null;
        if (gameOver) return;
        setPlayerBubble(winnerIndex, 'pass', getAILine('gameOverLoop', winnerIndex, 'HAHAHAHAHA'));
        render();
        gameOverBubbleIntervalId = setInterval(function() {
          if (gameOver) return;
          setPlayerBubble(winnerIndex, 'pass', getAILine('gameOverLoop', winnerIndex, 'HAHAHAHAHA'));
          render();
        }, 2500);
      }, 5500);
    }

    function showGameOverOverlay() {
      const overlay = document.getElementById('gameOverOverlay');
      const title = document.getElementById('gameOverTitle');
      const scoreLine = document.getElementById('gameOverScore');
      overlay.classList.add('show');
      if (gameOverByDeck) {
        title.textContent = '牌库用完';
        scoreLine.textContent = gameOverWinnerName + ' 分数最高 (' + gameOverWinnerScore + ') 获胜';
      } else if (gameOverIsYou) {
        title.textContent = '你赢了!';
        scoreLine.textContent = gameOverWinnerScore + ' 分，获胜!';
      } else {
        title.textContent = gameOverWinnerName + ' 获胜';
        scoreLine.textContent = '得分 ' + gameOverWinnerScore + ' 分';
      }
    }

    function hideGameOverOverlay() {
      var tableChipsEl = document.getElementById('tableChips');
      if (tableChipsEl) { tableChipsEl.innerHTML = ''; tableChipsEl.removeAttribute('data-bid'); }
      var passEl = document.getElementById('tablePassIndicators');
      if (passEl) passEl.innerHTML = '';
      document.getElementById('gameOverOverlay').classList.remove('show');
      var cw = document.getElementById('confettiWrap');
      if (cw) { cw.classList.add('hidden'); cw.innerHTML = ''; }
      stopXiaobaiVictoryAnimation();
      stopZhizhiVictoryAnimation();
      stopSansVictoryAnimation();
      stopHumanVictoryAnimation();
    }

    function setMessage(msg, isAi = false) {
      /* 中间提示已移除，保留空函数避免调用处报错 */
    }

    function render() {
      const wrapEl = document.getElementById('currentCardWrap');
      const cardEl = document.getElementById('currentCard');
      cardEl.classList.remove('card-reveal');
      if (currentCard != null) {
        wrapEl.classList.remove('hidden');
        var lab = VALUE_LABELS[currentCard.value];
        var sym = SUIT_SYMBOLS[currentCard.suit];
        cardEl.innerHTML = '<span class="card-value">' + lab + '</span><span class="card-suit">' + sym + '</span>';
        cardEl.classList.remove('empty');
        if (justRevealedCard) {
          justRevealedCard = false;
          requestAnimationFrame(function() { cardEl.classList.add('card-reveal'); });
        }
      } else {
        wrapEl.classList.add('hidden');
        cardEl.innerHTML = '?';
        cardEl.classList.add('empty');
      }

      const tableChipsEl = document.getElementById('tableChips');
      if (bidHistory.length > 0 && !tableChipsClearedForCardFly) {
        var returnSuffix = chipsReturnedByPile ? ('|' + chipsReturnedByPile.join(',')) : '';
        var hideLeaderSuffix = tableChipsHideLeader ? '|hideLeader' : '';
        var cacheKey = bidHistory.map(function(b) { return b.who + ':' + b.amount; }).join(',') + returnSuffix + hideLeaderSuffix;
        if (tableChipsEl.getAttribute('data-bid') !== cacheKey) {
          tableChipsEl.innerHTML = '';
          tableChipsEl.setAttribute('data-bid', cacheKey);
          var radius = 5.5;
          var globalIndex = 0;
          bidHistory.forEach(function(entry, pileIndex) {
            var who = entry.who;
            var returned = chipsReturnedByPile ? (chipsReturnedByPile[pileIndex] || 0) : 0;
            var n = Math.max(0, entry.amount - returned);
            if (tableChipsHideLeader && who === currentLeader) n = 0;
            var cx = 50, cy = 50, zoneW = 28, zoneH = 16;
            if (who === 0) { cx = 50; cy = 83; zoneW = 28; zoneH = 14; }
            else if (who === 1) { cx = 15; cy = 50; zoneW = 16; zoneH = 28; }
            else if (who === 2) { cx = 50; cy = 17; zoneW = 28; zoneH = 14; }
            else { cx = 85; cy = 50; zoneW = 16; zoneH = 28; }
            var offsetX = (pileIndex % 3 - 1) * 4;
            var offsetY = (pileIndex >= 2 ? 1 : -1) * 3;
            cx = cx + offsetX;
            cy = cy + offsetY;
            var ringCount = Math.min(n, 6);
            var stackCount = n - ringCount;
            var seed = who * 31 + entry.amount * 17 + pileIndex * 7;
            for (var i = 0; i < n; i++) {
              var chip = document.createElement('div');
              chip.className = 'chip';
              var jitter = (seed + i * 7) % 5 - 2;
              var rot = (seed + i * 13) % 32 - 16;
              var px, py;
              if (i < ringCount) {
                var angle = (i / ringCount) * 2 * Math.PI + 0.1 * i;
                px = cx + (radius + jitter * 0.3) * Math.cos(angle);
                py = cy + (radius + jitter * 0.3) * Math.sin(angle);
              } else {
                var t = (i - ringCount) / Math.max(stackCount, 1);
                px = cx + (jitter * 1.2);
                py = cy + (t * 3 - 1.5) + jitter * 0.5;
              }
              chip.style.left = px + '%';
              chip.style.top = py + '%';
              chip.style.transform = 'translate(-50%,-50%) rotate(' + rot + 'deg)';
              chip.style.zIndex = globalIndex++;
              tableChipsEl.appendChild(chip);
            }
          });
          if (!chipsReturnedByPile && justPlacedBid) {
            justPlacedBid = false;
            var feltEl = document.querySelector('.felt');
            if (feltEl) {
              var isLarge = bidHistory.some(function(e) { return e.amount >= 8; });
              feltEl.classList.remove('felt-shake', 'felt-shake-heavy', 'felt-shake-light');
              feltEl.offsetHeight;
              feltEl.classList.add(isLarge ? 'felt-shake-heavy' : 'felt-shake-light');
              if (isLarge) {
                var flyLayer = document.getElementById('chipFlyLayer');
                if (tableChipsEl && flyLayer) {
                  var rect = tableChipsEl.getBoundingClientRect();
                  var pcx = 50, pcy = 50;
                  if (currentLeader === 0) { pcx = 50; pcy = 83; }
                  else if (currentLeader === 1) { pcx = 15; pcy = 50; }
                  else if (currentLeader === 2) { pcx = 50; pcy = 17; }
                  else if (currentLeader === 3) { pcx = 85; pcy = 50; }
                  var cx = rect.left + rect.width * pcx / 100;
                  var cy = rect.top + rect.height * pcy / 100;
                  for (var i = 0; i < 18; i++) {
                    var angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.4;
                    var dist = 18 + Math.random() * 72;
                    var tx = Math.cos(angle) * dist + 'px';
                    var ty = Math.sin(angle) * dist + 'px';
                    var p = document.createElement('div');
                    p.className = 'chip-burst-particle';
                    p.style.left = cx + 'px';
                    p.style.top = cy + 'px';
                    p.style.setProperty('--tx', tx);
                    p.style.setProperty('--ty', ty);
                    p.style.opacity = (0.75 + Math.random() * 0.25).toFixed(2);
                    flyLayer.appendChild(p);
                    setTimeout(function(el) { if (el.parentNode) el.parentNode.removeChild(el); }, 450, p);
                  }
                }
              }
              setTimeout(function() {
                feltEl.classList.remove('felt-shake', 'felt-shake-heavy', 'felt-shake-light');
              }, isLarge ? 560 : 240);
            }
          }
        }
      }
      /* 无出价时不在 render 里清空桌面筹码，只在新一轮翻牌时由 doFlipStep 清空，保证本轮内筹码一直留在桌上 */
      var passEl = document.getElementById('tablePassIndicators');
      passEl.innerHTML = '';
      if (!tableChipsClearedForCardFly) {
        passedThisRound.forEach(function(pid) {
          var cx = 50, cy = 50;
          if (pid === 0) { cx = 50; cy = 83; }
          else if (pid === 1) { cx = 15; cy = 50; }
          else if (pid === 2) { cx = 50; cy = 17; }
          else { cx = 85; cy = 50; }
          var div = document.createElement('div');
          div.className = 'pass-indicator';
          div.style.left = cx + '%';
          div.style.top = cy + '%';
          passEl.appendChild(div);
        });
      }
      document.getElementById('bidPoolNum').textContent = currentBid ? '×' + currentBid : '0';
      players.forEach((p, i) => {
        const div = document.getElementById('player' + i);
        var baseClass = 'player player-' + ['bottom','left','top','right'][i] + (i === HUMAN_INDEX ? ' you' : '');
        if (i === 3 && document.body.classList.contains('xiaobai-left-seat')) baseClass += ' xiaobai-on-table';
        if (i === 1 && document.getElementById('zhizhiVictoryWrap')) baseClass += ' zhizhi-on-table';
        if (i === 2 && document.getElementById('sansVictoryWrap')) baseClass += ' sans-on-table';
        if (i === 0 && document.getElementById('humanVictoryWrap')) baseClass += ' human-on-table';
        if ([0, 2, 3].indexOf(i) >= 0 && gameOver && gameOverWinnerIndex === 1) baseClass += ' zhizhi-rap-shake';
        div.className = baseClass;
        if (p.score >= TARGET_SCORE) div.classList.add('winner'); else div.classList.remove('winner');
        if (i === 3 && document.getElementById('xiaobaiVictoryWrap')) div.classList.remove('winner');
        if (i === 1 && document.getElementById('zhizhiVictoryWrap')) div.classList.remove('winner');
        if (i === 2 && document.getElementById('sansVictoryWrap')) div.classList.remove('winner');
        if (i === 0 && document.getElementById('humanVictoryWrap')) div.classList.remove('winner');
        const xiaobaiOnTable = i === 3 && div.classList.contains('xiaobai-on-table');
        const zhizhiOnTable = i === 1 && div.classList.contains('zhizhi-on-table');
        const sansOnTable = i === 2 && div.classList.contains('sans-on-table');
        const bubble = !xiaobaiOnTable && !zhizhiOnTable && !sansOnTable && currentBubble && currentBubble.playerIndex === i;
        let bubbleContent = '';
        var bubbleAnimateIn = false;
        if (bubble) {
          var bubbleKey = currentBubble.playerIndex + '-' + currentBubble.type + '-' + (currentBubble.value || '');
          if (currentBubble.type === 'think') {
            bubbleAnimateIn = thinkDots === 0;
            var dots = '.'.repeat(1 + (thinkDots % 3));
            var thinkPrefix = getAILine('thinkPrefix', currentBubble.playerIndex, '我要验牌');
            bubbleContent = '<span class="think-text">' + thinkPrefix + dots + '</span>';
          } else if (currentBubble.type === 'bid') {
            bubbleAnimateIn = bubbleKey !== lastBubbleAnimatedKey;
            if (bubbleAnimateIn) lastBubbleAnimatedKey = bubbleKey;
            bubbleContent = '<div class="chip chip-in-bubble"></div><span>×' + currentBubble.value + '</span>';
          } else if (currentBubble.type === 'hurry') {
            bubbleAnimateIn = bubbleKey !== lastBubbleAnimatedKey;
            if (bubbleAnimateIn) lastBubbleAnimatedKey = bubbleKey;
            bubbleContent = '<span>' + (currentBubble.value || '麻溜点！') + '</span>';
          } else {
            bubbleAnimateIn = bubbleKey !== lastBubbleAnimatedKey;
            if (bubbleAnimateIn) lastBubbleAnimatedKey = bubbleKey;
            var passText = currentBubble.value || '不要';
            if (currentBubble.playerIndex === 1 && document.getElementById('xiaobaiVictoryWrap')) {
              bubbleContent = passText.split('').map(function(c) { return '<span class="bubble-char-shake">' + c + '</span>'; }).join('');
            } else {
              bubbleContent = '<span>' + passText + '</span>';
            }
          }
        } else if (!currentBubble) {
          lastBubbleAnimatedKey = '';
        }
        const bubbleHtml = bubble
          ? '<div class="player-bubble show ' + (currentBubble.type === 'bid' ? 'bubble-bid ' : '') + (currentBubble.type === 'hurry' ? 'bubble-shake ' : '') + (bubbleAnimateIn ? 'bubble-animate-in' : '') + '">' + bubbleContent + '</div>'
          : '<div class="player-bubble"></div>';
        const avatarHtml = '<div class="player-avatar' + (i === hurryAvatarIndex ? ' avatar-hurry' : '') + '"><img src="avatars/head_' + (i + 1) + '.png?v=8" alt=""></div>';
        div.innerHTML = `
          <div class="player-main">
            <div class="player-info">
              <div class="player-bubble-wrap">
                ${bubbleHtml}
                ${avatarHtml}
              </div>
              <div class="player-name">${p.name}</div>
            </div>
            <div class="player-stats">
              <div class="player-chips${justAddedChip ? ' chip-fly-in glow' : ''}">
                <div class="chip"></div>
                <span class="chip-num">×${Math.max(0, chipReturnDisplay ? (p.chips - (chipReturnDisplay[i] || 0)) : p.chips)}</span>
              </div>
              <div class="score-card">
                <div class="score-progress-bg" style="width: ${(function(){ var w = ((p.score - (i === scoreAnimatingPlayerIndex ? scoreAnimatingAdd : 0)) / 30) * 100; w = Math.min(100, w); if (w >= 100) w = 98; return w; })()}%"></div>
                <span class="score-text">${p.score}/30</span>
              </div>
            </div>
          </div>
        `;
      });

      if (scoreAnimatingPlayerIndex >= 0) {
        var idx = scoreAnimatingPlayerIndex;
        var targetWidth = Math.min(100, (players[idx].score / 30) * 100);
        if (targetWidth >= 100) targetWidth = 98;
        setTimeout(function() {
          var el = document.querySelector('#player' + idx + ' .score-progress-bg');
          if (el) el.style.width = targetWidth + '%';
          scoreAnimatingPlayerIndex = -1;
        }, 50);
      }

      const isHumanTurn = !gameOver && currentCard != null && players[(firstBidder + bidIndex) % 4].isHuman;
      var btnAgainInGame = document.getElementById('btnAgainInGame');
      if (btnAgainInGame) {
        if (gameOver) {
          if (gameOverTime === 0) {
            gameOverTime = Date.now();
            if (!gameOverAgainScheduled) {
              gameOverAgainScheduled = true;
              setTimeout(function() { if (gameOver) render(); }, 7000);
            }
          }
          if (Date.now() - gameOverTime >= 7000) {
            btnAgainInGame.classList.add('show');
          } else {
            btnAgainInGame.classList.remove('show');
          }
        } else {
          btnAgainInGame.classList.remove('show');
        }
      }
      if (!isHumanTurn) {
        document.getElementById('btnPass').style.display = 'none';
        document.getElementById('btnPass').disabled = true;
      }
      if (justAddedChip) {
        justAddedChip = false;
        setTimeout(function() {
          document.querySelectorAll('.player-chips').forEach(function(el) {
            el.classList.remove('chip-fly-in', 'glow');
          });
        }, 650);
      }
    }

    document.getElementById('newGame').onclick = startGame;
    document.getElementById('btnAgain').onclick = () => { hideGameOverOverlay(); startGame(); };
    document.getElementById('btnAgainInGame').onclick = startGame;
    var rulesOverlayAsHelp = false;
    var startBtnClicked = false;
    document.getElementById('btnStartGame').onclick = function() {
      if (rulesOverlayAsHelp) {
        document.getElementById('rulesOverlay').classList.add('hidden');
        rulesOverlayAsHelp = false;
        this.innerHTML = '<span class="btn-start-char" style="animation-delay: 0s">开</span><span class="btn-start-char" style="animation-delay: 0.12s">始</span><span class="btn-start-char" style="animation-delay: 0.24s">游</span><span class="btn-start-char" style="animation-delay: 0.36s">戏</span><span class="btn-start-char" style="animation-delay: 0.48s">!</span>';
        return;
      }
      if (startBtnClicked) return;
      startBtnClicked = true;
      var chip = document.getElementById('startChipSource');
      var btn = this;
      if (!chip || !btn) {
        startBtnClicked = false;
        document.getElementById('rulesOverlay').classList.add('hidden');
        startGame();
        return;
      }
      var btnR = btn.getBoundingClientRect();
      var chipW = 36;
      var chipH = 36;
      var startX = btnR.left + btnR.width / 2 - chipW / 2;
      var startY = btnR.top - 280;
      var endX = btnR.left + btnR.width / 2 - chipW / 2;
      var endY = btnR.top + btnR.height / 2 - chipH / 2;
      var fly = chip.cloneNode(true);
      fly.classList.add('chip-fly-clone');
      fly.style.animation = 'none';
      fly.style.visibility = 'visible';
      fly.style.left = startX + 'px';
      fly.style.top = startY + 'px';
      fly.style.position = 'fixed';
      fly.style.margin = '0';
      fly.style.width = chipW + 'px';
      fly.style.height = chipH + 'px';
      document.body.appendChild(fly);
      var trailStop = false;
      var trailRafId;
      var trailFrame = 0;
      function spawnTrailParticle() {
        if (trailStop) return;
        trailFrame++;
        if (trailFrame % 2 === 0) {
          var r = fly.getBoundingClientRect();
          var size = 6 + Math.random() * 10;
          var offsetX = (Math.random() - 0.5) * 20;
          var p = document.createElement('div');
          p.className = 'chip-fly-particle';
          p.style.left = (r.left + r.width / 2 - size / 2 + offsetX) + 'px';
          p.style.top = (r.top + r.height) + 'px';
          p.style.width = size + 'px';
          p.style.height = size + 'px';
          p.style.animationDuration = (0.35 + Math.random() * 0.3) + 's';
          p.style.animationDelay = (Math.random() * 0.08) + 's';
          p.style.setProperty('--tx', (Math.random() - 0.5) * 16 + 'px');
          p.style.setProperty('--scale-end', (0.2 + Math.random() * 0.35).toFixed(2));
          document.body.appendChild(p);
          setTimeout(function() { if (p.parentNode) p.remove(); }, 700);
        }
        if (!trailStop) trailRafId = requestAnimationFrame(spawnTrailParticle);
      }
      trailRafId = requestAnimationFrame(spawnTrailParticle);
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          fly.style.transition = 'left 0.55s ease-in, top 0.6s ease-in';
          fly.style.left = endX + 'px';
          fly.style.top = endY + 'px';
        });
      });
      fly.addEventListener('transitionend', function done(ev) {
        if (ev.propertyName !== 'top') return;
        fly.removeEventListener('transitionend', done);
        trailStop = true;
        if (trailRafId) cancelAnimationFrame(trailRafId);
        fly.remove();
        var startBtn = document.getElementById('btnStartGame');
        startBtn.classList.add('btn-start-hit');
        if (typeof playStartGameSound === 'function') playStartGameSound();
        setTimeout(function() {
          startBtn.classList.remove('btn-start-hit');
          setTimeout(function() {
            document.getElementById('rulesOverlay').classList.add('hidden');
            startBtnClicked = false;
            startGame();
          }, 380);
        }, 520);
      });
    };
    (function() {
      var ro = document.getElementById('rulesOverlay');
      if (!ro) return;
      function startBgmOnRulesInteraction() {
        startBgmIfNeeded();
        ro.removeEventListener('click', startBgmOnRulesInteraction);
        ro.removeEventListener('touchstart', startBgmOnRulesInteraction);
      }
      ro.addEventListener('click', startBgmOnRulesInteraction, true);
      ro.addEventListener('touchstart', startBgmOnRulesInteraction, true);
    })();
    document.getElementById('btnHelp').onclick = function() {
      document.getElementById('tutorialOverlay').classList.remove('hidden');
    };
    document.getElementById('btnSettings').onclick = function() { /* 设置：暂无功能 */ };
    document.getElementById('btnTutorial').onclick = function() {
      document.getElementById('tutorialOverlay').classList.remove('hidden');
    };
    document.getElementById('btnCredits').onclick = function() { /* 制作组：暂无功能 */ };
    document.getElementById('btnExit').onclick = function() { /* 退出：暂无功能 */ };
    document.getElementById('btnTutorialClose').onclick = function() {
      document.getElementById('tutorialOverlay').classList.add('hidden');
    };
    document.getElementById('btnAdd10').onclick = function() {
      if (gameOver || !players.length) return;
      players.forEach(function(p) { p.score += 10; });
      render();
      var best = players.reduce(function(a, b) { return a.score >= b.score ? a : b; });
      if (best.score >= 30) {
        gameOver = true;
        gameOverByDeck = false;
        gameOverWinnerName = best.name;
        gameOverWinnerScore = best.score;
        gameOverIsYou = best.isHuman;
        gameOverWinnerIndex = players.indexOf(best);
        setTimeout(function() { showGameOverCelebration(); }, 1200);
      }
    };
    function setAiWinner(aiIndex) {
      if (gameOver || !players.length || aiIndex < 1 || aiIndex > 3) return;
      var p = players[aiIndex];
      if (!p || p.isHuman) return;
      p.score = 30;
      gameOver = true;
      gameOverByDeck = false;
      gameOverWinnerName = p.name;
      gameOverWinnerScore = p.score;
      gameOverIsYou = false;
      gameOverWinnerIndex = aiIndex;
      render();
      setTimeout(function() { showGameOverCelebration(); }, 1200);
    }
    function setMeWinner() {
      if (gameOver || !players.length) return;
      var p = players[0];
      if (!p || !p.isHuman) return;
      p.score = 30;
      gameOver = true;
      gameOverByDeck = false;
      gameOverWinnerName = p.name;
      gameOverWinnerScore = p.score;
      gameOverIsYou = true;
      gameOverWinnerIndex = 0;
      render();
      setTimeout(function() { showGameOverCelebration(); }, 1200);
    }
    document.getElementById('btnMeWin').onclick = setMeWinner;
    document.getElementById('btnAiWin1').onclick = function() { setAiWinner(1); };
    document.getElementById('btnAiWin2').onclick = function() { setAiWinner(2); };
    document.getElementById('btnAiWin3').onclick = function() { setAiWinner(3); };
    document.getElementById('btnBgmSwitch').onclick = function() {
      stopNormalBgm();
      currentBgmIndex = (currentBgmIndex + 1) % 3;
      var btn = document.getElementById('btnBgmSwitch');
      if (btn) btn.textContent = 'BGM' + (currentBgmIndex + 1);
      if (currentBgmIndex === 0) {
        bgmMode = 0;
        startBgmIfNeeded();
      } else if (currentBgmIndex === 1) {
        playVictoryBgm();
      } else {
        playFailureBgm();
      }
    };
    var musicClickCount = 0;
    var musicClickLastTime = 0;
    document.getElementById('btnMusic').onclick = function() {
      var now = Date.now();
      if (now - musicClickLastTime > 3000) musicClickCount = 0;
      musicClickLastTime = now;
      musicClickCount++;
      if (musicClickCount >= 5) {
        document.body.classList.toggle('cheat-mode');
        musicClickCount = 0;
      } else {
        toggleMusic();
      }
    };
    document.addEventListener('click', function(e) {
      if (e.target && (e.target.tagName === 'BUTTON' || e.target.closest('button'))) {
        playButtonClickSound();
      }
    });
    fillRulesBgCards();
  </script>
